<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTRL+Print</title>
    <link href="print.css" media="print" rel="stylesheet" @page {margin: 0;}/>
    <link rel="stylesheet" href="./style.css" media="all">
    <script src="./scripts.js" defer></script>
    <script src="./settings.js" defer></script>
</head>
<body id="set-theme" onload="LoadSettings(), setTheme(modeSelect)">
    <div class="content">
        <div class="header">
            <a id="back" href="index.html"></a>
            <h1>CTRL+Print</h1>
        </div>
        <div>
                
        </div>
        <div class="page-content">
           <div class="settings-main">
                <div>
                    <h3>Kontaktuppgifter</h3>
                    <div class="flex-col">
                        <label for="username">Namn:</label>
                        <input type="text" id="username" value="">
                    </div>
                    <div class="flex-col">
                        <label for="company-name">Företagsnamn:</label>
                        <input type="text" id="company-name" value="">
                    </div>
                    <div class="flex-col">
                        <label for="company-address">Adress:</label>
                        <input type="text" id="company-address" value="" autocomplete="street-address">
                    </div>
                    <div class="flex-col">
                        <label for="company-post">Postnummer:</label>
                        <input type="number" id="company-post" value="" autocomplete="postal-code">
                    </div>
                    <div class="flex-col">
                        <label for="company-location">Ort:</label>
                        <input type="text" id="company-location" value="">
                    </div>
                    <div class="flex-col">
                        <label for="company-email">E-post:</label>
                        <input type="email" id="company-email" value="" autocomplete="email">
                    </div>
                    <div class="flex-col">
                        <label for="company-tel">Telefon:</label>
                        <input type="tel" id="company-tel" value="" autocomplete="tel">
                    </div>
                </div>
                <div class="flex-col">
                    <select id="preferred-mode">
                        <option selected disabled hidden value="">Välj tema</option>
                        <option value="light">Ljust</option>
                        <option value="dark">Mörkt</option>
                    </select>
                
                    
                </div>
                <div id="confirm"></div>
                <button onclick="SaveToLocal()">Spara</button>
                <button class="erase" onclick="ClearLocal()" style="color: white">Rensa Data</button>
          
           </div>
        </div>
        <div class="footer">
            <p id="copy">©dennisfyren, 2026</p>
            <p>v.0.4</p>
        </div>
    </div>
</body>
</html>
