<!DOCTYPE html>
<html lang="en">
<head>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTRL+Print</title>
    <link href="print.css" media="print" rel="stylesheet" @page {margin: 0;}/>
    <link rel="stylesheet" href="./print.css" media="all">
    <script src="./print.js" defer></script>
</head>
<body>
    <main class="main">
        <header class="header">
            <div class="logo">
                <!-- <img src="resources/home-1-svgrepo-com.svg" id="logo"> -->
                 <h1>Certego</h1>
            </div>
            <h2 id="doc-type"></h2>
        </header>
        <aside class="nav">
            <button onclick="window.history.go(-1);">Redigera</button>
        <button onclick="Print()">Print!</button>
        </aside>
        <div class="main-content">
            <section class="category" id="first">
                <section class="sub-category">
                    <div>
                            <label>Kund:</label>
                            <p data-key="customer"></p>
                        </div>
                        <div>
                            <label>Anläggning:</label>
                            <p data-key="facility"></p>
                        </div>
                        <div>
                            <label>Kontaktperson:</label>
                            <p data-key="contact"></p>
                        </div>
             </section>
                <section class="sub-category">
                    <div>
                        <label>Utfört av:</label>
                        <p data-key="installer"></p>
                    </div>
                    <div>
                        <label>Typ av kontroll:</label>
                        <p data-key="controltype"></p>
                    </div>
                    <div>
                        <label>Utfört Datum:</label>
                        <p data-key="date"></p>
                    </div>
                    <!-- <div>
                        <label>Arbetsorder:</label>
                        <p data-key="workorder"></p>
                    </div>
                    <div>
                        <label>Objektnummer:</label>
                        <p data-key="object"></p>
                    </div> -->
                </section>
            </section>
            
            <section class="category">
                <section class="sub-category">
                    <h2>1. Centralapparat</h2>
                    <div>
                            <label>1.1 - Typ av Central:</label>
                            <p data-key="type"></p>
                        </div>
                        <div>
                            <label>1.2 - Antal sektioner:</label>
                            <p data-key="alarmpoints"></p>
                        </div>
                        <div>
                            <label>1.3 - Laddspänning:</label>
                            <p data-key="charge"></p>
                            <p>V</p>
                        </div>
                        <div>
                            <label>1.4 - Strömförbrukning:</label>
                            <p data-key="current"></p>
                            <p>mA</p>
                        </div>
                        <div>
                            <label>1.5 - Version:</label>
                            <p data-key="version"></p>
                        </div>
                        <div>
                            <label>1.6 - Display/Summer:</label>
                            <p data-key="display"></p>
                        </div>
                        <div>
                            <label>1.7 - Tid och datum:</label>
                            <p data-key="time-date"></p>
                        </div>
                        <div class="add-margin">
                            <label>1.8 - Notering:</label>
                            <p id="central-comment"></p>
                        </div>
             </section>
             
                <section class="sub-category">
                    <h2>2. Prov sektion</h2>
                    <div>
                        <label>2.1 - Stickprov sektion:</label>
                        <p data-key="test-alarm"></p>
                    </div>
                    <div>
                        <label>2.2 - Status:</label>
                        <p data-key="test-alarm-status"></p>
                    </div>
                    <div class="add-margin">
                        <label>2.3 - Notering:</label>
                        <p id="test-comment"></p>
                    </div>
                </section>
                <section class="sub-category">
                    <h2>3. Prov larmdon och indikering</h2>
                    <div>
                        <label>3.1 - Larmdon:</label>
                        <p data-key="siren"></p>
                    </div>
                    <div>
                        <label>3.2 - Yttre larmdon:</label>
                        <p data-key="out-siren"></p>
                    </div>
                    <div class="add-margin">
                        <label>3.3 - Notering:</label>
                        <p id="facility-comment"></p>
                    </div>
                </section>
                <section class="sub-category">
                    <h2>4. Prov utgångar och styrningar</h2>
                    <div>
                        <label>4.1 - Dörrhållarmagneter:</label>
                        <p data-key="magnets"></p>
                    </div>
                    <div>
                        <label>4.2 - Ventilationsstyrning<em> Endast utgång</em>:</label>
                        <p data-key="ventilation"></p>
                    </div>
                    <div>
                        <label>4.3 - Övriga styrningar:</label>
                        <p data-key="out-other"></p>
                    </div>
                    <div class="add-margin">
                        <label>4.4 - Notering:</label>
                        <p id="out-comment"></p>
                    </div>
                </section>
                <section class="sub-category">
                    <h2>5. Prov larmöverföring</h2>
                    <div>
                        <label>5.1 - Larmsändare typ:</label>
                        <p data-key="send-type"></p>
                    </div>
                    <div>
                        <label>5.2 - Prov karaktär:</label>
                        <p data-key="send-signals" class="array-display"></p>
                        <p id="send-signals-comment"> </p>
                    </div>
                    <div>
                        <label>5.3 - Status:</label>
                        <p data-key="send-ok"></p>
                    </div>
                    <div class="add-margin">
                        <label>5.4 - Notering:</label>
                        <p id="send-comment"></p>
                    </div>
                </section>
                <section class="sub-category">
                    <h2>6. Ackumulatorer</h2>
                    <div>
                        <label>6.1 - Kontroll batterier:</label>
                        <p data-key="batteries"></p>
                    </div>
                    <div>
                        <label>6.2 - Antal och typ:</label>
                        <p data-key="battery-number"></p>
                        <p>x</p>
                        <p data-key="battery-type"></p>
                        <p>Ah</p>
                    </div>
                    <div>
                        <label>6.3 - Nästa batteribyte:</label>
                        <p data-key="battery-change"></p>
                    </div>
                </section>
                <section class="sub-category">
                    <h2>7. Dokumentation</h2>
                    <div>
                        <label>7.1 - OR/SR ritningar:</label>
                        <p data-key="schematic"></p>
                    </div>
                    <div>
                        <label>7.2 - Anläggarintyg:</label>
                        <p data-key="certificate"></p>
                    </div>
                    <div>
                        <label>7.3 - Datum anläggarintyg:</label>
                        <p data-key="certificate-date"></p>
                    </div>
                    <div>
                        <label>7.4 - Anläggningsskötarskylt:</label>
                        <p data-key="service-sign"></p>
                    </div>
                    <div class="add-margin">
                        <label>7.5 - Notering:</label>
                        <p id="document-comment"></p>
                    </div>
                </section>
                <section class="sub-category">
                     <h2>8. Förbättringsförslag/Övrigt</h2>
                    <div class="add-margin">
                        <p id="improvements"></p>
                    </div>
            </section>
                
            </section>
        </div>
    </main>
    
</body>
</html>
